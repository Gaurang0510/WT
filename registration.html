<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <!-- background: linear-gradient(135deg, #667eea, #764ba2); -->
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {

            background: url("back.png");
          
                
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
             
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .form-control {
            border-radius: 12px;
        }

        .btn-custom {
            border-radius: 25px;
            padding: 10px;
            font-weight: bold;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            border: none;
        }

        .btn-custom:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
    </style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-lg p-4 bg-white">

                <h3 class="text-center mb-4 text-primary">Create Account</h3>

                <!-- Redirect to success page -->
                <form action="Success.html">

                    <div class="mb-3">
                        <input type="text" class="form-control" placeholder="Full Name" required>
                    </div>

                    <div class="mb-3">
                        <input type="email" class="form-control" placeholder="Email Address" required>
                    </div>

                    <div class="mb-3">
                        <input type="password" class="form-control" placeholder="Password" required>
                    </div>

                    <div class="mb-3">
                        <input type="tel" class="form-control" placeholder="Mobile Number" required>
                    </div>

                    <div class="mb-3">
                        <textarea class="form-control" rows="3" placeholder="Address" required></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-custom text-white">
                            Register Now
                        </button>
                    </div>

                </form>

                <p class="text-center mt-3">
                    Already have an account?
                    <a href="Login.html" class="text-decoration-none fw-bold">Login</a>
                </p>

            </div>

        </div>
    </div>
</div>

</body>
</html>
