<!DOCTYPE html>
<html>
<head>
<title>JavaScript Dialog Boxes</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 60px;
    background-color: #f2f2f2;
}

h2 {
    color: darkblue;
}

button {
    background-color: #007BFF;
    color: white;
    padding: 10px 18px;
    margin: 10px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}
</style>

<script>
function showAlert() {
    alert("This is an Alert Dialog Box!");
}

function showConfirm() {
    var result = confirm("Are you sure you want to continue?");
    
    if (result == true) {
        alert("You pressed OK");
    } else {
        alert("You pressed Cancel");
    }
}

function showPrompt() {
    var name = prompt("Enter your name:");

    if (name != null && name != "") {
        alert("Hello " + name + "!");
    } else {
        alert("No name entered");
    }
}
</script>

</head>

<body>

<h2>JavaScript Dialog Boxes Demo</h2>

<button onclick="showAlert()">
Show Alert
</button>

<button onclick="showConfirm()">
Show Confirm
</button>

<button onclick="showPrompt()">
Show Prompt
</button>

</body>
</html>
