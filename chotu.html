<!DOCTYPE html>
<html>
<head>
<title>Fibonacci Generator</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
        width: 350px;
    }

    h2 {
        margin-bottom: 20px;
        color: #333;
    }

    input {
        padding: 10px;
        width: 80%;
        border-radius: 8px;
        border: 1px solid #ccc;
        margin-bottom: 15px;
        font-size: 16px;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background-color: #667eea;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #5643c2;
    }

    #demo {
        margin-top: 20px;
        font-weight: bold;
        color: #444;
        word-wrap: break-word;
    }

    .error {
        color: red;
        font-size: 14px;
    }
</style>

</head>
<body>

<div class="card">
    <h2>Fibonacci Generator</h2>
    
    <input type="number" id="numberInput" placeholder="Enter value of n">
    <br>
    <button onclick="generateFibonacci()">Generate</button>

    <p id="error" class="error"></p>
    <p id="demo"></p>
</div>

<script>

function generateFibonacci() {
    let n = document.getElementById("numberInput").value;
    let error = document.getElementById("error");
    let output = document.getElementById("demo");

    error.innerHTML = "";
    output.innerHTML = "";

    if (n <= 0 || n === "") {
        error.innerHTML = "Please enter a valid positive number!";
        return;
    }

    let a = 0, b = 1;
    let result = "";

    for (let i = 1; i <= n; i++) {
        result += a + " ";
        let next = a + b;
        a = b;
        b = next;
    }

    output.innerHTML = result;
}

</script>

</body>
</html>
