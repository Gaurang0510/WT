<!DOCTYPE html>
<html>
<head>
<title>JavaScript Demo</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    text-align: center;
    margin-top: 50px;
}

h2 {
    color: darkblue;
}

p {
    font-size: 18px;
    color: #333;
}

button {
    background-color: #007BFF;
    color: white;
    padding: 10px 18px;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background-color: #0056b3;
}
</style>

<script>
function myfunction()
{
    document.getElementById("demo").innerHTML =
    "This text comes after the JS function works";

    document.write(4 + 5);
}

function myfun()
{
    alert("You should not click that");
}
</script>

</head>

<body>

<h2>Demo of JavaScript</h2>

<p id="demo">A Paragraph</p>

<button type="button" onclick="myfunction()">
Click here to activate JS function
</button>

<br><br>

<button type="button" onclick="myfun()">
Do not click here
</button>

</body>
</html>
