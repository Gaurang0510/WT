<!-- write a function that returns the array of an even numbers from given array using a for looop -->

<!DOCTYPE html>
<html>
<body>

<h2>Find Even Numbers in Array</h2>
<p id="demo"></p>

<script>

function getEvenNumbers(arr) {
    let evenArray = [];

    for (let i = 0; i < arr.length; i++) {
        if (arr[i] % 2 === 0) {
            evenArray.push(arr[i]);
        }
    }

    return evenArray;
}

let numbers = [10, 15, 22, 33, 40, 55, 60];
let result = getEvenNumbers(numbers);

document.getElementById("demo").innerHTML =
    "Even numbers are: " + result;

</script>

</body>
</html>
